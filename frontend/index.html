<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Homemade Cookies</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/index.html">
      <span class="logo-icon" aria-hidden="true">🍪</span>
      Homemade Cookies
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="/index.html" class="active">Shop</a>

      <a href="/dashboard.html" data-customer-only>Dashboard</a>
      <a href="/cart.html" data-customer-only>Cart</a>
      <a href="/wishlist.html" data-customer-only>Wishlist</a>
      <a href="/track-order.html" data-customer-only>Track Order</a>

      <a href="/admin/dashboard.html" data-admin-only hidden>Admin Dashboard</a>
      <a href="/admin/products.html" data-admin-only hidden>Manage Cookie</a>
      <a href="/admin/categories.html" data-admin-only hidden>Manage Categories</a>
      <a href="/admin/orders.html" data-admin-only hidden>Manage Orders</a>
    </nav>
    <span id="nav-user" class="nav-user"></span>
    <a class="btn-cart" href="/cart.html" data-customer-only>
      🛒 Cart <span id="cart-count" class="cart-badge" hidden></span>
    </a>
  </header>

  <section class="page-hero">
    <h1>Our Cookies</h1>
    <p>Freshly baked homemade treats — browse and add to your cart.</p>
  </section>

  <main class="main-wide" id="shop">
    <p id="catalog-loading" class="status-text">Loading cookies…</p>
    <p id="catalog-error" class="status-text error" hidden></p>
    <div id="product-grid" class="product-grid" aria-live="polite"></div>
    <div id="catalog-message" class="toast" hidden aria-live="polite"></div>
  </main>

  <section id="edit-cookie-modal" class="modal-overlay" hidden>
    <div class="modal-card">
      <button type="button" id="edit-cookie-close" class="modal-close">×</button>

      <h2>Edit Cookie</h2>
      <p class="hint">Update existing cookie details.</p>

      <form id="edit-cookie-form">
        <input type="hidden" id="editCookieId">

        <img id="editImagePreview" class="edit-image-preview" src="/images/cookie-default.svg" alt="Cookie preview">

        <input type="file" id="editCookieImageFile" accept="image/*">

        <div class="form-group">
          <label for="editCookieName">Cookie Name</label>
          <input type="text" id="editCookieName" required>
        </div>

        <div class="form-group">
          <label for="editCookieDescription">Description</label>
          <textarea id="editCookieDescription"></textarea>
        </div>

        <div class="form-group">
          <label for="editCookiePrice">Price (RM)</label>
          <input type="number" id="editCookiePrice" min="0" step="0.01" required>
        </div>

        <div class="form-group">
          <label for="editCookieStock">Stock Quantity</label>
          <input type="number" id="editCookieStock" min="0" step="1" required>
        </div>

        <div class="form-group">
          <label for="editCookieCategoryId">Category</label>
          <select id="editCookieCategoryId" required></select>
        </div>

        <div class="modal-actions">
          <button type="submit" class="btn-primary">Save Changes</button>
          <button type="button" id="edit-cookie-discard" class="btn-secondary modal-discard">Discard</button>
        </div>
      </form>
    </div>
  </section>

  <footer class="site-footer">Homemade Cookies · Shop</footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/catalog.js"></script>
</body>
</html>
