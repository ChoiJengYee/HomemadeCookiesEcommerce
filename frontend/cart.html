<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Homemade Cookies</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/index.html">
      <span class="logo-icon" aria-hidden="true">🍪</span>
      Homemade Cookies
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="/index.html">Shop</a>
      <a href="/cart.html" class="active">Cart</a>
      <a href="/wishlist.html">Wishlist</a>
      <a href="/track-order.html">Track order</a>
    </nav>
    <span id="nav-user" class="nav-user"></span>
    <a class="btn-cart active" href="/cart.html">
      🛒 Cart <span id="cart-count" class="cart-badge" hidden></span>
    </a>
  </header>

  <section class="page-hero">
    <h1>Your Cart</h1>
    <p>Review items before checkout.</p>
  </section>

  <main class="main-cart">
    <div id="cart-message" class="result" hidden aria-live="polite"></div>

    <p id="cart-empty" class="empty-state" hidden>
      Your cart is empty. <a href="/index.html#shop">Browse cookies</a> to get started.
    </p>

    <section id="cart-items" class="cart-list" hidden aria-label="Cart items"></section>

    <section id="cart-summary" class="card cart-summary" hidden>
      <div class="cart-summary-row">
        <span>Total</span>
        <strong id="cart-total">RM 0.00</strong>
      </div>
      <a href="/checkout.html" class="btn-primary btn-checkout">Proceed to checkout</a>
      <a href="/index.html#shop" class="btn-secondary">Continue shopping</a>
    </section>
  </main>

  <footer class="site-footer">Homemade Cookies · Cart</footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/cart.js"></script>
  
  <script>
    // Check for success message from product-options page
    (function checkForAddedMessage() {
      const urlParams = new URLSearchParams(window.location.search);
      const added = urlParams.get('added');
      const name = urlParams.get('name');
      
      if (added === 'true' && name) {
        const decodedName = decodeURIComponent(name);
        const messageEl = document.getElementById('cart-message');
        if (messageEl) {
          messageEl.textContent = `✓ ${decodedName} added to your cart!`;
          messageEl.className = 'result success';
          messageEl.hidden = false;
          
          setTimeout(() => {
            messageEl.hidden = true;
          }, 4000);
          
          // Clean URL
          const newUrl = window.location.pathname;
          window.history.replaceState({}, document.title, newUrl);
        }
      }
    })();
    
  </script>
  <script>
  // Debug - Check storage on cart page load
  (function() {
    console.log('=== CART PAGE DEBUG ===');
    console.log('localStorage pendingCustomCart:', localStorage.getItem('pendingCustomCart'));
    console.log('sessionStorage:', sessionStorage.getItem('customCartItems'));
    console.log('URL:', window.location.href);
  })();
</script>
</body>
</html>
