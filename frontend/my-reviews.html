<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reviews - Homemade Cookies</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/my-reviews.css">
</head>
<body>
    <div class="my-reviews-container">
        <!-- Header -->
        <div class="page-header">
            <h1 class="page-title">
                📝 My Reviews
                <span id="reviewCount">(0)</span>
            </h1>
            <a href="/profile.html" class="back-link">← Back to Profile</a>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-number" id="totalReviews">0</div>
                <div class="stat-label">Total Reviews</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="avgRating">0.0</div>
                <div class="stat-label">Average Rating</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalProducts">0</div>
                <div class="stat-label">Products Reviewed</div>
            </div>
        </div>

        <!-- Reviews List -->
        <div id="reviewsList">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p style="margin-top: 15px;">Loading your reviews...</p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/my-reviews.js"></script>
</body>
</html>
