<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Homemade Cookies</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/index.html">
      <span class="logo-icon" aria-hidden="true">🍪</span>
      Homemade Cookies
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="/index.html">Shop</a>
      <a href="/cart.html" data-customer-only>Cart</a>
      <a href="/wishlist.html" data-customer-only>Wishlist</a>
      <a href="/track-order.html" data-customer-only>Track order</a>
      <a href="/admin/products.html" data-admin-only hidden>Admin</a>
      <a href="/admin/orders.html" data-admin-only hidden>Orders</a>
    </nav>
    <span id="nav-user" class="nav-user"></span>
    <a class="btn-cart" href="/cart.html" data-customer-only>
      🛒 Cart <span id="cart-count" class="cart-badge" hidden></span>
    </a>
  </header>

  <section class="page-hero">
    <h1>Profile Dashboard</h1>
    <p>Keep your account info, shipping address, and contact details up to date.</p>
  </section>

  <main class="main-wide">
    <div class="card profile-card">
      <form id="profile-form">
        <div class="form-group">
          <label for="profileName">Name</label>
          <input type="text" id="profileName" required>
        </div>
        <div class="form-group">
          <label for="profileEmail">Email</label>
          <input type="email" id="profileEmail" readonly>
        </div>
        <div class="form-group">
          <label for="profileAddress">Address</label>
          <input type="text" id="profileAddress" required>
        </div>
        <div class="form-group">
          <label for="profilePhone">Phone</label>
          <input type="text" id="profilePhone" required>
        </div>
        <button type="submit" class="btn-primary">Save profile</button>
      </form>
      <div id="profile-result" class="result" hidden aria-live="polite"></div>
    </div>
  </main>

  <footer class="site-footer">Homemade Cookies · Profile</footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
