<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Categories | Homemade Cookies</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/index.html">
      <span class="logo-icon" aria-hidden="true">🍪</span>
      Homemade Cookies
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="/index.html">Shop</a>
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/products.html">Products</a>
      <a href="/admin/orders.html">Orders</a>
      <a href="/admin/categories.html">Categories</a>
      <a href="/admin/users.html">Users</a>
    </nav>
    <span id="nav-user" class="nav-user"></span>
  </header>

  <section class="page-hero">
    <h1>Cookie categories</h1>
    <p>Create, rename, or remove categories for your store.</p>
  </section>

  <main class="main-wide">
    <div class="card">
      <h2>Manage categories</h2>
      <form id="category-form" class="admin-form">
        <div class="form-group">
          <label for="categoryName">New category name</label>
          <input type="text" id="categoryName" required>
        </div>
        <button class="btn-primary">Create category</button>
      </form>
      <div id="category-result" class="result" hidden aria-live="polite"></div>
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="category-list"></tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">Homemade Cookies · Categories</footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin-categories.js"></script>
</body>
</html>
