<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist | Homemade Cookies</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/index.html">
      <span class="logo-icon" aria-hidden="true">🍪</span>
      Homemade Cookies
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="/index.html">Shop</a>
      <a href="/cart.html">Cart</a>
      <a href="/wishlist.html" class="active">Wishlist</a>
      <a href="/track-order.html">Track order</a>
      <a href="/admin/products.html" data-admin-only hidden>Admin</a>
    </nav>
    <span id="nav-user" class="nav-user"></span>
    <a class="btn-cart" href="/cart.html">🛒 Cart</a>
  </header>

  <section class="page-hero">
    <h1>Your wishlist</h1>
    <p>Save cookies for later — Customer.AddToWishlist / MoveWishlistToCart</p>
  </section>

  <main class="main-wide">
    <div class="card">
      <p id="wishlist-loading" class="status-text">Loading wishlist…</p>
      <p id="wishlist-empty" class="empty-state" hidden>Your wishlist is empty.</p>
      <div id="wishlist-items" class="wishlist-list" hidden></div>
      <button type="button" id="move-to-cart-btn" class="btn-primary" hidden>Move all to cart</button>
      <div id="wishlist-message" class="result" hidden aria-live="polite"></div>
    </div>
  </main>

  <footer class="site-footer">Homemade Cookies · Wishlist</footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/wishlist.js"></script>
</body>
</html>
