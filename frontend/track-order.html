<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | Homemade Cookies</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/index.html">
      <span class="logo-icon" aria-hidden="true">🍪</span>
      Homemade Cookies
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="/index.html">Shop</a>
      <a href="/cart.html">Cart</a>
      <a href="/track-order.html" class="active">Track order</a>
    </nav>
    <span id="nav-user" class="nav-user"></span>
    <a class="btn-cart" href="/cart.html">🛒 Cart</a>
  </header>

  <section class="page-hero">
    <h1>Track order</h1>
    <p>State pattern — view status and cancel while Pending</p>
  </section>

  <main>
    <div class="card">
      <span class="pattern-badge">State</span>
      <p id="orders-loading" class="status-text">Loading your orders…</p>
      <div id="customer-order-tabs" class="status-tabs">
        <button class="status-tab active" data-filter="All">All</button>
        <button class="status-tab" data-filter="InProgress">In progress</button>
        <button class="status-tab" data-filter="Achieved">Achieved</button>
        <button class="status-tab" data-filter="Cancelled">Cancelled</button>
      </div>

      <p id="orders-loading" class="status-text">Loading your orders…</p>
      <p id="orders-error" class="status-text error" hidden></p>

      <div id="customer-orders-list" class="orders-list" hidden></div>

      <div id="track-result" class="result" hidden aria-live="polite"></div>
    </div>
  </main>

  <footer class="site-footer">Homemade Cookies · Track</footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/track-order.js"></script>
</body>
</html>
