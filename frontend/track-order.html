<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | Homemade Cookies</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/index.html">
      <span class="logo-icon" aria-hidden="true">🍪</span>
      Homemade Cookies
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="/index.html">Shop</a>
      <a href="/cart.html">Cart</a>
      <a href="/track-order.html" class="active">Track order</a>
      <a href="/admin/products.html">Admin</a>
    </nav>
    <a class="btn-cart" href="/cart.html">🛒 Cart</a>
  </header>

  <section class="page-hero">
    <h1>Track order</h1>
    <p>State pattern — view status and cancel while Pending</p>
  </section>

  <main>
    <div class="card">
      <span class="pattern-badge">State</span>
      <form id="track-form" class="track-form">
        <div class="form-group">
          <label for="orderId">Order ID</label>
          <input type="number" id="orderId" name="orderId" min="1" placeholder="e.g. 1" required>
        </div>
        <button type="submit" class="btn-primary">View status</button>
      </form>

      <div id="track-result" class="result" hidden aria-live="polite"></div>
      <div id="order-detail" class="order-detail" hidden></div>
      <button type="button" id="cancel-order-btn" class="btn-secondary btn-danger" hidden>Cancel order</button>
    </div>
  </main>

  <footer class="site-footer">Homemade Cookies · Track</footer>

  <script src="/js/api.js"></script>
  <script src="/js/track-order.js"></script>
</body>
</html>
