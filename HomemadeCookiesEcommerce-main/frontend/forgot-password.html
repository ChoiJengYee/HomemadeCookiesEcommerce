<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Homemade Cookies</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/index.html">
      <span class="logo-icon" aria-hidden="true">🍪</span>
      Homemade Cookies
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="/index.html">Shop</a>
      <a href="/login.html">Login</a>
    </nav>
    <span id="nav-user" class="nav-user"></span>
  </header>

  <section class="page-hero">
    <h1>Forgot password</h1>
    <p>Enter your email to receive a password reset hint.</p>
  </section>

  <main class="auth-main">
    <div class="card auth-card">
      <form id="forgot-form">
        <div class="form-group">
          <label for="forgotEmail">Email</label>
          <input type="email" id="forgotEmail" name="email" required autocomplete="email">
        </div>
        <button type="submit" class="btn-primary">Request reset</button>
      </form>
      <div id="forgot-result" class="result" hidden aria-live="polite"></div>
      <p class="hint"><a href="/login.html">Back to login</a></p>
    </div>
  </main>

  <footer class="site-footer">Homemade Cookies · Forgot password</footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
